@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700;900&display=swap');
:root{--bg:#0d0d12;--surface:#14141e;--card:#1a1a28;--border:#2a2a3e;--orange:#e8580a;--amber:#f0a020;--text:#d8d8e8;--muted:#7878a0;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:16px;line-height:1.7;min-height:100vh;}
.container{max-width:900px;margin:0 auto;padding:60px 24px 120px;}
#hero{text-align:center;padding:40px 0 60px;}
#hero h1{font-family:'Orbitron',monospace;font-size:42px;font-weight:900;color:#fff;text-shadow:0 0 40px rgba(232,88,10,.3);letter-spacing:3px;margin-bottom:16px;}
#hero p{color:var(--muted);font-size:18px;max-width:600px;margin:0 auto;}
.section{margin-bottom:48px;}
.section-title{font-family:'Orbitron',monospace;font-size:12px;letter-spacing:3px;color:var(--orange);text-transform:uppercase;margin-bottom:20px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.guide-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.guide-card{background:var(--card);border:1px solid var(--border);padding:20px 24px;text-decoration:none;display:block;transition:all .2s;position:relative;}
.guide-card:hover{border-color:var(--orange);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3);}
.guide-card-title{font-family:'Orbitron',monospace;font-size:16px;font-weight:700;color:#fff;letter-spacing:1px;}
.footer{text-align:center;padding-top:40px;border-top:1px solid var(--border);color:var(--muted);font-size:13px;}
.footer a{color:var(--orange);text-decoration:none;}
.footer a:hover{text-decoration:underline;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border);}
</style>
</head>
