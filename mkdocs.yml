site_name: RokiArkNet
site_description: ARK Survival Ascended server plugins and mod guides
site_url: https://rokiarknet.github.io

theme:
  name: material
  palette:
    scheme: slate
    primary: deep orange
    accent: orange
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight

nav:
  - Home: index.md
  - Plugins:
    - Overview: plugins/index.md
    - EngramControl: plugins/engramcontrol.md
    - DinoLoot: plugins/dinoloot.md
    - TekUnlock: plugins/tekunlock.md
    - DinoLevelOverride: plugins/dinoleveloverride.md
    - RiderProtection: plugins/riderprotection.md
    - ItemExchange: plugins/itemexchange.md
  - Guides:
    - Primal Nemesis: primal-nemesis.md
    - Primal Chaos: primal-chaos.md
    - Ark Descended: ark-descended.md
    - Ark Supreme: ark-supreme.md
    - Cataclysm 2.0: cataclysm-2.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true

docs_dir: content
