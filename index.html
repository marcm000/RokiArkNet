<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RokiArkNet</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700;900&display=swap');
:root{--bg:#0d0d12;--surface:#14141e;--card:#1a1a28;--border:#2a2a3e;--orange:#e8580a;--amber:#f0a020;--text:#d8d8e8;--muted:#7878a0;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:16px;line-height:1.7;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.container{max-width:600px;padding:60px 24px;text-align:center;}
#hero h1{font-family:'Orbitron',monospace;font-size:48px;font-weight:900;color:#fff;text-shadow:0 0 40px rgba(232,88,10,.3);letter-spacing:4px;margin-bottom:16px;}
#hero p{color:var(--muted);font-size:18px;margin-bottom:60px;}
.nav-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;}
.nav-card{background:var(--card);border:1px solid var(--border);padding:40px 24px;text-decoration:none;display:block;transition:all .2s;}
.nav-card:hover{border-color:var(--orange);transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.4);}
.nav-card-title{font-family:'Orbitron',monospace;font-size:20px;font-weight:700;color:#fff;letter-spacing:2px;margin-bottom:8px;}
.nav-card-desc{color:var(--muted);font-size:14px;}
.footer{margin-top:80px;color:var(--muted);font-size:13px;}
.footer a{color:var(--orange);text-decoration:none;}
.footer a:hover{text-decoration:underline;}
</style>
</head>
<body>
<div class="container">
  <div id="hero">
    <h1>ROKIARKNET</h1>
    <p>ARK: Survival Ascended Resources</p>
  </div>

  <div class="nav-grid">
    <a href="guides.html" class="nav-card">
      <div class="nav-card-title">MOD GUIDES</div>
      <div class="nav-card-desc">Progression guides for Primal Nemesis, Chaos, and more</div>
    </a>
    <a href="plugins.html" class="nav-card">
      <div class="nav-card-title">PLUGINS</div>
      <div class="nav-card-desc">ArkApi server plugins for ASA</div>
    </a>
  </div>

  <div class="footer">
    <a href="https://discord.gg/rokiarknet">Discord</a> | <a href="https://ko-fi.com/rokiarknet">Ko-fi</a> | <a href="https://github.com/RokiArkNet">GitHub</a>
  </div>
</div>
</body>
</html>
