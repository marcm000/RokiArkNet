:root{--bg:#0d0d12;--surface:#14141e;--card:#1a1a28;--border:#2a2a3e;--orange:#e8580a;--amber:#f0a020;--text:#d8d8e8;--muted:#7878a0;--tip:#0f2a1a;--tip-border:#1a6a30;--warn:#2a1a08;--warn-border:#8a4010;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:16px;line-height:1.7;display:flex;}
#sidebar{position:fixed;top:0;left:0;width:240px;height:100vh;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;z-index:100;padding-bottom:40px;}
#sidebar-header{padding:20px 16px 14px;border-bottom:1px solid var(--border);}
.logo{font-family:'Orbitron',monospace;font-size:11px;color:var(--orange);letter-spacing:3px;}
#sidebar-header h2{font-size:14px;font-weight:700;color:var(--text);margin-top:4px;}
#sidebar nav a{display:block;padding:8px 16px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:600;border-left:2px solid transparent;transition:all .15s;}
#sidebar nav a:hover,#sidebar nav a.active{color:var(--orange);border-left-color:var(--orange);background:rgba(232,88,10,.06);}
.nav-section{padding:12px 16px 4px;font-size:10px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;opacity:.6;}
#main{margin-left:240px;flex:1;max-width:860px;padding:48px 48px 120px;}
#loading{text-align:center;padding:80px;font-family:'Orbitron',monospace;color:var(--orange);letter-spacing:3px;}
#hero{text-align:center;padding:40px 0 48px;border-bottom:1px solid var(--border);margin-bottom:56px;}
.eyebrow{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:4px;color:var(--orange);text-transform:uppercase;margin-bottom:12px;}
#hero h1{font-family:'Orbitron',monospace;font-size:36px;font-weight:900;color:#fff;text-shadow:0 0 40px rgba(232,88,10,.3);letter-spacing:2px;}
.baseline-box{margin-top:20px;background:var(--card);border:1px solid var(--border);border-left:3px solid var(--amber);padding:12px 16px;font-size:13px;color:var(--muted);display:inline-block;text-align:left;}
.section{margin-bottom:56px;}
.section-title{font-family:'Orbitron',monospace;font-size:13px;letter-spacing:3px;color:var(--orange);text-transform:uppercase;margin-bottom:20px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.section h3{font-size:16px;font-weight:700;color:var(--amber);margin:24px 0 10px;text-transform:uppercase;letter-spacing:1px;}
.section h4{font-size:14px;font-weight:700;color:var(--text);margin:16px 0 6px;}
.section p{margin-bottom:12px;color:var(--text);}
.section ul,.section ol{padding-left:20px;margin-bottom:12px;}
.section li{margin-bottom:4px;color:var(--text);}
.section strong{color:var(--amber);}
.tip{background:var(--tip);border-left:3px solid var(--tip-border);padding:10px 14px;font-size:14px;color:#90d8a0;margin:14px 0;}
.tip::before{content:'TIP  ';font-weight:700;letter-spacing:2px;}
.warn{background:var(--warn);border-left:3px solid var(--warn-border);padding:10px 14px;font-size:14px;color:#d8a060;margin:14px 0;}
.warn::before{content:'WARNING  ';font-weight:700;letter-spacing:2px;color:var(--orange);}
.struct-badge{display:inline-block;background:rgba(232,88,10,.12);border:1px solid rgba(232,88,10,.25);padding:3px 10px;font-size:12px;color:var(--orange);margin-bottom:14px;letter-spacing:1px;}
.guide-footer{margin-top:80px;padding-top:24px;border-top:1px solid var(--border);font-size:13px;color:var(--muted);}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border);}
@media(max-width:768px){#sidebar{display:none;}#main{margin-left:0;padding:24px 20px 80px;}}
.creature-legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:24px;font-size:12px;color:var(--muted);align-items:center;}
.creature-legend-item{display:flex;align-items:center;gap:6px;}
.creature-tier{margin-bottom:36px;}
.creature-tier-title{font-size:11px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:2px;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.creature-sub-title{font-size:10px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:2px;margin:14px 0 8px;}
.creature-grid{display:flex;flex-wrap:wrap;gap:5px;}
.creature{background:var(--card);border:1px solid var(--border);padding:4px 10px;font-size:11px;font-weight:600;color:var(--text);border-radius:3px;}
.creature.egg{border-color:#3B6D11;color:#c8f0a0;}
.creature.breedable{border-color:#3B6D11;color:#97C459;}
.creature.boss{background:#1a0f0a;border:1px solid #e8580a;color:#F0997B;font-weight:700;}
.creature.hydro{border-color:#185FA5;color:#85B7EB;}

.creature.volcanic{border-color:#993C1D;color:#F0997B;}
.creature.frost{border-color:#185FA5;color:#85B7EB;}
.creature.nature{border-color:#3B6D11;color:#97C459;}
.creature.earth{border-color:#854F0B;color:#EF9F27;}

.creature.ghost{border-color:#5F5E5A;color:#B4B2A9;}
.creature.plague{border-color:#A32D2D;color:#F09595;}
.creature.celestial{border-color:#0F6E56;color:#5DCAA5;}

const CONTENT_URL='https://raw.githubusercontent.com/rokiarknet/RokiArkNet/main/content/primal-nemesis.md';
const NAV_SECTIONS={'Overview':['tier-list','getting-started'],'Progression':['alpha','apex','elemental','plasma-ghost-plague','bionic','celestial-demonic','godly'],'Reference':['creature-reference','loot-bosses','loot-system','resource-ores','charms','titans','faq']};
const SECTION_LABELS={'tier-list':'Tier List','getting-started':'Getting Started','alpha':'Alpha','apex':'Apex','elemental':'Elemental','plasma-ghost-plague':'Plasma / Ghost / Plague','bionic':'Bionic','celestial-demonic':'Celestial / Demonic','godly':'Godly','creature-reference':'Creature Reference','loot-bosses':'Boss Reference','loot-system':'Loot System','resource-ores':'Resource Ores','charms':'Charms & Totems','titans':'Titans','faq':'FAQ & Tips'};

function buildNav(){
  const nav=document.getElementById('nav');
  for(const[group,ids]of Object.entries(NAV_SECTIONS)){
    const div=document.createElement('div');div.className='nav-section';div.textContent=group;nav.appendChild(div);
    ids.forEach(id=>{const a=document.createElement('a');a.href='#'+id;a.textContent=SECTION_LABELS[id]||id;nav.appendChild(a);});
  }
}

function renderTierDiagram(){
  const wrap=document.createElement('div');
  wrap.style.cssText='background:#14141e;border:1px solid #2a2a3e;border-radius:4px;padding:20px 16px;margin:8px 0;overflow-x:auto;';

  // Columns:
  // C1: Alpha → AlphaSkel → Apex → ApexSkel (stacked)
  // C2: Elementals x6 (stacked, centered on c1)
  // C3: Plague (main path, centered on c2)
  //     + Plasma|Ghost above as optional side branch (dashed arrow from c2)
  // C4: Bionic → Celestial/Demonic → Godly

  const C1=8, NW=130, NH=28, SW=108, SH=20, GAP=8;

  // Col1 y positions
  const ay=20, asy=ay+NH+GAP, apxy=asy+SH+GAP+2, apxsy=apxy+NH+GAP;
  const c1bottom=apxsy+SH;
  const c1mid=Math.round((ay+c1bottom)/2);

  // Col2: elementals
  const C2=178, EW=110, EH=22, EGAP=5;
  const col2total=6*EH+5*EGAP;
  const ey0=Math.round(c1mid-col2total/2);
  const eY=Array.from({length:6},(_,i)=>ey0+i*(EH+EGAP));
  const c2mid=Math.round(ey0+col2total/2);
  const c2bot=ey0+col2total;

  // Col3: Plasma|Ghost (optional, above plague) + Plague (main)
  const C3=338;
  const PGW=80, PGH=22, PGGAP=6;
  const PLW=166, PLH=26;

  const plagueY=Math.round(c2mid-PLH/2);
  const pgY=plagueY-PGH-14;

  const convX=C2+EW+12;
  const pgMidY=Math.round(pgY+PGH/2);
  const pgMidX=C3+PGW+PGGAP/2;
  const plagueMidY=Math.round(plagueY+PLH/2);

  // Col4: Bionic → Cel/Dem → Godly
  const C4=556, B4W=114, B4H=26, B4GAP=10;
  const col4total=3*B4H+2*B4GAP;
  const by0=Math.round(c2mid-col4total/2);
  const bY=[by0, by0+B4H+B4GAP, by0+2*(B4H+B4GAP)];

  const plagueRightX=C3+PLW;
  const bionicMidY=Math.round(bY[0]+B4H/2);

  const totalH=Math.max(c1bottom, pgY, bY[2]+B4H)+30;

  let s=`<svg width="100%" viewBox="0 0 700 ${totalH}" xmlns="http://www.w3.org/2000/svg" style="min-width:560px;display:block;">`;
  s+=`<defs>
    <marker id="ta" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="4" markerHeight="4" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#3a3a50" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="ta-dim" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="4" markerHeight="4" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#3a3a50" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/></marker>
  </defs>`;

  const L=(x1,y1,x2,y2,arr,dim)=>`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#3a3a50" stroke-width="${dim?'0.75':'1'}"${dim?' stroke-dasharray="5 3"':''}${arr?` marker-end="url(#ta${dim?'-dim':''})"`:''} />`;
  const node=(x,y,w,h,txt,href,stroke,fill,font,size,sw,dim)=>
    `<a href="${href}"><g style="cursor:pointer"><rect x="${x}" y="${y}" width="${w}" height="${h}" rx="3" fill="#1a1a28" stroke="${stroke}" stroke-width="${sw||1.5}" opacity="${dim?'0.65':'1'}"/><text x="${x+w/2}" y="${y+h/2}" text-anchor="middle" dominant-baseline="central" font-family="${font||'Rajdhani,sans-serif'}" font-size="${size||10}" font-weight="700" fill="${fill}" opacity="${dim?'0.65':'1'}">${txt}</text></g></a>`;

  // COL 1
  s+=node(C1,ay,NW,NH,'Alpha','#alpha','#e8580a','#e8580a','Orbitron,monospace',10,1.5);
  s+=L(C1+NW/2,ay+NH,C1+NW/2,asy,true);
  s+=node(C1+11,asy,SW,SH,'Alpha Skeletal','#alpha','#7878a0','#7878a0','Rajdhani,sans-serif',9,1);
  s+=L(C1+NW/2,asy+SH,C1+NW/2,apxy,true);
  s+=node(C1,apxy,NW,NH,'Apex','#apex','#e8580a','#e8580a','Orbitron,monospace',10,1.5);
  s+=L(C1+NW/2,apxy+NH,C1+NW/2,apxsy,true);
  s+=node(C1+11,apxsy,SW,SH,'Apex Skeletal','#apex','#7878a0','#7878a0','Rajdhani,sans-serif',9,1);
  s+=L(C1+NW,c1mid,C2,c2mid,true);

  // COL 2 elementals
  const elems=[['Storm','#534AB7','#AFA9EC'],['Volcanic','#993C1D','#F0997B'],['Hydro','#185FA5','#85B7EB'],['Frost','#185FA5','#85B7EB'],['Nature','#3B6D11','#97C459'],['Earth','#854F0B','#EF9F27']];
  elems.forEach(([lbl,st,fi],i)=>{s+=node(C2,eY[i],EW,EH,lbl,'#elemental',st,fi,'Rajdhani,sans-serif',9.5,1);});

  // Converge right edge of elementals
  eY.forEach(y=>{s+=L(C2+EW,Math.round(y+EH/2),convX,Math.round(y+EH/2),false);});
  s+=L(convX,Math.round(eY[0]+EH/2),convX,Math.round(eY[5]+EH/2),false);

  // DASHED arrow from converge point → Plasma/Ghost (optional branch)
  s+=L(convX,Math.round(eY[0]+EH/2),pgMidX,pgY+PGH,true,true);

  // SOLID arrow from converge point → Plague (main path)
  s+=L(convX,c2mid,C3,plagueMidY,true);

  // Plasma | Ghost — dimmed, optional
  s+=node(C3,pgY,PGW,PGH,'Plasma','#plasma-ghost-plague','#534AB7','#AFA9EC','Rajdhani,sans-serif',9.5,1,true);
  s+=node(C3+PGW+PGGAP,pgY,PGW,PGH,'Ghost','#plasma-ghost-plague','#5F5E5A','#B4B2A9','Rajdhani,sans-serif',9.5,1,true);

  // Plague — main path
  s+=node(C3,plagueY,PLW,PLH,'Plague','#plasma-ghost-plague','#e8580a','#F09595','Rajdhani,sans-serif',10,1.5);

  // Arrow Plague → Bionic
  s+=L(C3+PLW,plagueMidY,C4,bionicMidY,true);

  // COL 4: Bionic → Cel/Dem → Godly
  s+=node(C4,bY[0],B4W,B4H,'Bionic','#bionic','#e8580a','#e8580a','Orbitron,monospace',10,1.5);
  s+=L(C4+B4W/2,bY[0]+B4H,C4+B4W/2,bY[1],true);
  s+=node(C4,bY[1],B4W,B4H,'Celestial/Demonic','#celestial-demonic','#534AB7','#AFA9EC','Rajdhani,sans-serif',9,1);
  s+=L(C4+B4W/2,bY[1]+B4H,C4+B4W/2,bY[2],true);
  s+=node(C4,bY[2],B4W,B4H,'Godly','#godly','#e8580a','#e8580a','Orbitron,monospace',10,1.5);

  // Water note
  const wY=totalH-16;
  s+=`<rect x="${C1}" y="${wY}" width="168" height="13" rx="2" fill="#14141e" stroke="#2a2a3e" stroke-width="1" stroke-dasharray="3 2"/>`;
  s+=`<text x="${C1+84}" y="${wY+6.5}" text-anchor="middle" dominant-baseline="central" font-family="Rajdhani,sans-serif" font-size="7.5" fill="#5F5E5A">Pacific~Alpha  Atlantic~Apex (non-progression)</text>`;

  // Optional label near Plasma/Ghost
  s+=`<text x="${C3+PLW/2}" y="${pgY-6}" text-anchor="middle" font-family="Rajdhani,sans-serif" font-size="7.5" fill="#5F5E5A" opacity="0.7">optional</text>`;

  s+='</svg>';
  wrap.innerHTML=s;
  return wrap;
}

function parseMarkdown(md){
  const sections=[];const lines=md.split('\n');let current=null;
  for(const line of lines){
    if(line.startsWith('## ')){if(current)sections.push(current);current={id:line.slice(3).trim(),lines:[]};}
    else if(current){current.lines.push(line);}
  }
  if(current)sections.push(current);
  return sections;
}

function renderSection(section){
  const div=document.createElement('div');div.className='section';div.id=section.id;
  const titleDiv=document.createElement('div');titleDiv.className='section-title';titleDiv.textContent=SECTION_LABELS[section.id]||section.id;div.appendChild(titleDiv);
  const inner=document.createElement('div');
  const blocks=[];let buffer=[];
  const flush=()=>{if(buffer.length){blocks.push({type:'md',content:buffer.join('\n')});buffer=[];}};
  for(const line of section.lines){
    if(line.includes('WARNING:')){flush();blocks.push({type:'warn',content:line.replace(/^> ⚠️ WARNING:?\s*/,'').replace(/^> WARNING:?\s*/,'')});}
    else if(line.startsWith('> STRUCTURE DAMAGE:')){flush();blocks.push({type:'struct',content:line.replace(/^> STRUCTURE DAMAGE:\s*/,'')});}
    else if(line.startsWith('> ')){flush();blocks.push({type:'tip',content:line.slice(2)});}
    else{buffer.push(line);}
  }
  flush();
  blocks.forEach(block=>{
    if(block.type==='warn'){const el=document.createElement('div');el.className='warn';el.textContent=block.content;inner.appendChild(el);}
    else if(block.type==='tip'){const el=document.createElement('div');el.className='tip';el.textContent=block.content;inner.appendChild(el);}
    else if(block.type==='struct'){const el=document.createElement('div');el.className='struct-badge';el.textContent='Structure Damage — '+block.content;inner.appendChild(el);}
    else{const el=document.createElement('div');el.innerHTML=marked.parse(block.content);
      el.querySelectorAll('h3').forEach(h=>h.style.cssText='font-size:16px;font-weight:700;color:#f0a020;margin:24px 0 10px;text-transform:uppercase;letter-spacing:1px;');
      el.querySelectorAll('h4').forEach(h=>h.style.cssText='font-size:14px;font-weight:700;color:#d8d8e8;margin:16px 0 6px;');
      el.querySelectorAll('p').forEach(p=>p.style.cssText='margin-bottom:12px;color:#d8d8e8;');
      el.querySelectorAll('ul,ol').forEach(l=>l.style.cssText='padding-left:20px;margin-bottom:12px;');
      el.querySelectorAll('li').forEach(l=>l.style.cssText='margin-bottom:4px;color:#d8d8e8;');
      el.querySelectorAll('strong').forEach(s=>s.style.color='#f0a020');
      inner.appendChild(el);}
  });
  div.appendChild(inner);return div;
}

async function loadGuide(){
  try{
    const resp=await fetch(CONTENT_URL+'?t='+Date.now());
    const md=await resp.text();
    const sections=parseMarkdown(md);
    const contentEl=document.getElementById('content');
    const hero=document.createElement('div');hero.id='hero';
    hero.innerHTML='<div class="eyebrow">RokiArkNet Guide</div><h1>PRIMAL NEMESIS</h1>';
    const baseline=sections.find(s=>s.id==='baseline');
    if(baseline){const box=document.createElement('div');box.className='baseline-box';box.innerHTML=marked.parse(baseline.lines.join('\n'));hero.appendChild(box);}
    contentEl.appendChild(hero);
    sections.filter(s=>s.id!=='baseline').forEach(section=>{
      if(section.id==='tier-list'){
        const td=document.createElement('div');td.className='section';td.id='tier-list';
        const tt=document.createElement('div');tt.className='section-title';tt.textContent='Tier List';
        td.appendChild(tt);td.appendChild(renderTierDiagram());contentEl.appendChild(td);return;
      }
      contentEl.appendChild(renderSection(section));
    });
    // Add creature reference section
    const crSec=document.createElement('div');crSec.className='section';crSec.id='creature-reference';
    const crTitle=document.createElement('div');crTitle.className='section-title';crTitle.textContent='Creature Reference';
    crSec.appendChild(crTitle);crSec.appendChild(renderCreatureReference());contentEl.appendChild(crSec);
    const footer=document.createElement('div');footer.className='guide-footer';
    footer.textContent='Last reviewed: 26 Mar 2026 | Contact @Rokitur on the Primal Nemesis Discord for corrections. Guide maintained by Rokitur — RokiArkNet';
    contentEl.appendChild(footer);
    document.getElementById('loading').style.display='none';
    contentEl.style.display='block';
    buildNav();
    const navLinks=document.querySelectorAll('#nav a');
    window.addEventListener('scroll',()=>{
      let current='';
      document.querySelectorAll('.section[id]').forEach(s=>{if(window.scrollY>=s.offsetTop-100)current=s.id;});
      navLinks.forEach(a=>{a.classList.toggle('active',a.getAttribute('href')==='#'+current);});
    });
  }catch(e){document.getElementById('loading').textContent='Failed to load guide. '+e.message;}
}
loadGuide();
</script>
