<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ark Descended Guide</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700;900&display=swap');
:root{--bg:#0d0d12;--surface:#14141e;--card:#1a1a28;--border:#2a2a3e;--orange:#e8580a;--amber:#f0a020;--text:#d8d8e8;--muted:#7878a0;--tip:#0f2a1a;--tip-border:#1a6a30;--warn:#2a1a08;--warn-border:#8a4010;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:16px;line-height:1.7;display:flex;}
#sidebar{position:fixed;top:0;left:0;width:240px;height:100vh;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;z-index:100;padding-bottom:40px;}
#sidebar-header{padding:20px 16px 14px;border-bottom:1px solid var(--border);}
.logo{font-family:'Orbitron',monospace;font-size:11px;color:var(--orange);letter-spacing:3px;}
#sidebar-header h2{font-size:14px;font-weight:700;color:var(--text);margin-top:4px;}
.home-link{display:block;font-size:11px;color:var(--muted);text-decoration:none;margin-bottom:8px;transition:color .15s;}
.home-link:hover{color:var(--orange);}
#sidebar nav a{display:block;padding:8px 16px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:600;border-left:2px solid transparent;transition:all .15s;}
#sidebar nav a:hover,#sidebar nav a.active{color:var(--orange);border-left-color:var(--orange);background:rgba(232,88,10,.06);}
.nav-section{padding:12px 16px 4px;font-size:10px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;opacity:.6;}
#main{margin-left:240px;flex:1;max-width:860px;padding:48px 48px 120px;}
#loading{text-align:center;padding:80px;font-family:'Orbitron',monospace;color:var(--orange);letter-spacing:3px;}
#hero{text-align:center;padding:40px 0 48px;border-bottom:1px solid var(--border);margin-bottom:56px;}
.eyebrow{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:4px;color:var(--orange);text-transform:uppercase;margin-bottom:12px;}
#hero h1{font-family:'Orbitron',monospace;font-size:36px;font-weight:900;color:#fff;text-shadow:0 0 40px rgba(232,88,10,.3);letter-spacing:2px;}
.baseline-box{margin-top:20px;background:var(--card);border:1px solid var(--border);border-left:3px solid var(--amber);padding:12px 16px;font-size:13px;color:var(--muted);display:inline-block;text-align:left;}
.section{margin-bottom:56px;}
.section-title{font-family:'Orbitron',monospace;font-size:13px;letter-spacing:3px;color:var(--orange);text-transform:uppercase;margin-bottom:20px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.section h3{font-size:16px;font-weight:700;color:var(--amber);margin:24px 0 10px;text-transform:uppercase;letter-spacing:1px;}
.section h4{font-size:14px;font-weight:700;color:var(--text);margin:16px 0 6px;}
.section p{margin-bottom:12px;color:var(--text);}
.section ul,.section ol{padding-left:20px;margin-bottom:12px;}
.section li{margin-bottom:4px;color:var(--text);}
.section strong{color:var(--amber);}
.tip{background:var(--tip);border-left:3px solid var(--tip-border);padding:10px 14px;font-size:14px;color:#90d8a0;margin:14px 0;}
.tip::before{content:'TIP  ';font-weight:700;letter-spacing:2px;}
.warn{background:var(--warn);border-left:3px solid var(--warn-border);padding:10px 14px;font-size:14px;color:#d8a060;margin:14px 0;}
.warn::before{content:'WARNING  ';font-weight:700;letter-spacing:2px;color:var(--orange);}
.struct-badge{display:inline-block;background:rgba(232,88,10,.12);border:1px solid rgba(232,88,10,.25);padding:3px 10px;font-size:12px;color:var(--orange);margin-bottom:14px;letter-spacing:1px;}
.guide-footer{margin-top:80px;padding-top:24px;border-top:1px solid var(--border);font-size:13px;color:var(--muted);}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border);}
@media(max-width:768px){#sidebar{display:none;}#main{margin-left:0;padding:60px 20px 80px;}.mobile-back{display:block;}}
.mobile-back{display:none;position:fixed;top:0;left:0;right:0;background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;z-index:100;}
.mobile-back a{color:var(--orange);text-decoration:none;font-size:14px;font-weight:600;}
.creature-tier{margin-bottom:32px;}
.creature-tier-title{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:2px;color:var(--orange);text-transform:uppercase;padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:14px;}
.creature-sub-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--amber);margin:14px 0 8px;}
.creature-grid{display:flex;flex-wrap:wrap;gap:5px;}
.creature{background:var(--card);border:1px solid var(--border);padding:4px 10px;font-size:11px;font-weight:600;color:var(--text);border-radius:3px;}
.loot-card{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--amber);padding:14px 18px;margin-bottom:12px;}
.loot-card-title{font-size:14px;font-weight:700;color:var(--amber);margin-bottom:6px;}
.loot-card-drops{font-size:13px;color:var(--text);margin-bottom:8px;}
.loot-card-note{font-size:12px;color:var(--muted);font-style:italic;}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin:16px 0;}
.prod-card{background:var(--card);border:1px solid var(--border);padding:12px 16px;}
.prod-card-name{font-weight:700;color:var(--amber);font-size:14px;margin-bottom:4px;}
.prod-card-output{font-size:13px;color:var(--text);}
.prod-card-note{font-size:11px;color:var(--muted);margin-top:6px;}
.build-inline{margin:16px 0;}
.build-inline div{background:var(--card);border:1px solid var(--border);padding:10px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.build-inline .name{color:var(--amber);font-weight:600;}
.build-inline .stats{color:var(--muted);font-size:13px;}
</style>
</head>
<body>
<div class="mobile-back"><a href="index.html">← All Guides</a></div>

  <div id="sidebar-header">

function buildNav(){
  const nav=document.getElementById('nav');
  for(const[group,ids]of Object.entries(NAV_SECTIONS)){
    const div=document.createElement('div');div.className='nav-section';div.textContent=group;nav.appendChild(div);
    ids.forEach(id=>{const a=document.createElement('a');a.href='#'+id;a.textContent=SECTION_LABELS[id]||id;nav.appendChild(a);});
  }
}

async function loadGuide(){
  buildNav();
  try{
    const res=await fetch(CONTENT_URL);
    const md=await res.text();
    const sections={};let cur='';
    md.split('\n').forEach(line=>{
      const m=line.match(/^## (.+)/);
      if(m){cur=m[1].toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/-+$/,'');sections[cur]='';}
      else if(cur)sections[cur]+=line+'\n';
    });
    const content=document.getElementById('content');
    const loading=document.getElementById('loading');

    // Hero
    const hero=document.createElement('div');hero.id='hero';
    hero.innerHTML=`<h1>ARK DESCENDED</h1>`;
    if(sections['baseline']){
      const box=document.createElement('div');box.className='baseline-box';
      box.innerHTML=marked.parse(sections['baseline'].trim());
      hero.appendChild(box);
    }
    content.appendChild(hero);

    // Tier list diagram
    if(sections['tier-list']){
      const sec=document.createElement('div');sec.className='section';sec.id='tier-list';
      sec.innerHTML=`<h2 class="section-title">Tier List</h2>`;
      sec.appendChild(renderTierDiagram());
      content.appendChild(sec);
    }

    // Markdown sections
    const order=['getting-started','t2-excellent','t3-divine-devilish','t4-celestial-abyssal','t5-warchiefs','t6-bionic','t7-wardens','t8-god-trials','t9-dark-seals','t10-dream','reaper-evolution','ice-titan-evolution','managarmr-evolution','legendary-evolution','infected-evolution','ancient-evolution','supply-drops','loot-bosses','passive-production','faq'];
    order.forEach(id=>{
      if(!sections[id])return;
      const sec=document.createElement('div');sec.className='section';sec.id=id;
      const title=SECTION_LABELS[id]||id;
      let html=marked.parse(sections[id]);
      html=html.replace(/<blockquote>\s*<p>\s*STRUCTURE DAMAGE:/g,'<div class="struct-badge">STRUCTURE DAMAGE:').replace(/N\/A<\/p>\s*<\/blockquote>/g,'N/A</div>');
      html=html.replace(/<blockquote>\s*<p>\s*WARNING:/g,'<div class="warn">').replace(/<\/p>\s*<\/blockquote>/g,'</div>');
      html=html.replace(/<blockquote>\s*<p>/g,'<div class="tip">').replace(/<\/p>\s*<\/blockquote>/g,'</div>');
      sec.innerHTML=`<h2 class="section-title">${title}</h2>`+html;
      content.appendChild(sec);
    });

    // Creature reference
    const crSec=document.createElement('div');crSec.className='section';crSec.id='creature-reference';
    crSec.innerHTML=`<h2 class="section-title">Creature Reference</h2>`;
    crSec.appendChild(renderCreatureReference());
    content.appendChild(crSec);

    // Footer
    const footer=document.createElement('div');footer.className='guide-footer';
    footer.innerHTML='Guide maintained by Rokitur — RokiArkNet<br>Last reviewed: 17 Jan 2026';
    content.appendChild(footer);

    loading.style.display='none';content.style.display='block';

    // Scroll spy
    const anchors=[...document.querySelectorAll('.section')];
    const navLinks=document.querySelectorAll('#nav a');
    window.addEventListener('scroll',()=>{
      let cur='';
      anchors.forEach(s=>{if(window.scrollY>=s.offsetTop-120)cur=s.id;});
      navLinks.forEach(a=>{a.classList.toggle('active',a.getAttribute('href')==='#'+cur);});
    });
  }catch(e){document.getElementById('loading').textContent='Error loading guide';}
}
loadGuide();
</script>
